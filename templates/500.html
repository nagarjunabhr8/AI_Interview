{% extends "base.html" %}

{% block title %}Server Error{% endblock %}

{% block content %}
<div style="text-align: center; padding: 48px 20px;">
    <h2 style="font-size: 44px; color: var(--danger); margin-bottom: 8px; letter-spacing: -0.02em;">500</h2>
    <h3 style="color: var(--ink-800); margin-bottom: 16px; font-weight: 600;">Server Error</h3>
    <p class="subtext" style="margin-bottom: 28px;">Something went wrong. Please try again.</p>
    <a href="/" class="btn-primary" style="display: inline-block; text-decoration: none; padding: 11px 24px;">Back to Home</a>
</div>
{% endblock %}
