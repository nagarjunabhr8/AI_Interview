{% extends "base.html" %}

{% block title %}Phase 0 - Candidate Intake{% endblock %}

{% block content %}
<h2>📋 Phase 0: Candidate Intake</h2>
<p style="color: #7f8c8d; margin-bottom: 30px;">Let's gather some information before we begin your interview.</p>

<form id="intakeForm">
    <div class="form-group">
        <label for="role">Target Role / Designation *</label>
        <select id="role" name="role" required>
            <option value="">Select a role...</option>
            <option value="QA Engineer">QA Engineer</option>
            <option value="Senior QA Engineer">Senior QA Engineer</option>
            <option value="Lead QA Engineer">Lead QA Engineer</option>
            <option value="QA Manager">QA Manager</option>
            <option value="SDET">SDET</option>
            <option value="Automation Architect">Automation Architect</option>
            <option value="Backend Developer">Backend Developer</option>
            <option value="Frontend Engineer">Frontend Engineer</option>
            <option value="DevOps Engineer">DevOps Engineer</option>
            <option value="Data Analyst">Data Analyst</option>
            <option value="Product Manager">Product Manager</option>
            <option value="Full Stack Engineer">Full Stack Engineer</option>
        </select>
    </div>

    <div class="form-group">
        <label for="skills">Primary Skills (comma-separated) *</label>
        <input type="text" id="skills" name="skills" placeholder="e.g., Playwright, Java, Python" required>
        <small style="color: #7f8c8d; display: block; margin-top: 5px;">Enter at least one skill</small>
    </div>

    <div class="form-group">
        <label for="experience">Years of Experience *</label>
        <input type="number" id="experience" name="experience" placeholder="e.g., 5.5" step="0.5" min="0" required>
    </div>

    <div class="form-group">
        <label for="difficulty">Interview Difficulty Level *</label>
        <select id="difficulty" name="difficulty" required>
            <option value="">Select difficulty...</option>
            <option value="Fresher">Fresher (0-1 years)</option>
            <option value="Basic">Basic (1-3 years)</option>
            <option value="Simple">Simple (3-6 years)</option>
            <option value="Hard">Hard (6+ years)</option>
        </select>
    </div>

    <div class="form-group">
        <label for="resume">Resume / Summary (Optional)</label>
        <textarea id="resume" name="resume" placeholder="Paste your resume or career summary here (optional)..."></textarea>
    </div>

    <div id="ratingFields" style="display: none;">
        <h3 style="margin-top: 20px; margin-bottom: 15px;">Self-Ratings (1-5 scale)</h3>
        <div id="skillRatings"></div>
    </div>

    <div class="button-group">
        <button type="button" class="btn-secondary" onclick="window.location.href='/'">Back</button>
        <button type="submit" class="btn-primary">Continue to Interview</button>
    </div>
</form>

<div class="loading">
    <div class="spinner"></div>
    <p style="margin-top: 15px;">Preparing your interview...</p>
</div>

<script>
    const skillsInput = document.getElementById('skills');
    const ratingFields = document.getElementById('ratingFields');
    const skillRatings = document.getElementById('skillRatings');

    skillsInput.addEventListener('change', () => {
        const skills = skillsInput.value.split(',').map(s => s.trim()).filter(s => s);

        if (skills.length > 0) {
            ratingFields.style.display = 'block';
            skillRatings.innerHTML = '';

            skills.forEach(skill => {
                const fieldId = `rating_${skill.replace(/\s+/g, '_').replace(/,/g, '').toLowerCase()}`;
                const div = document.createElement('div');
                div.className = 'form-group';
                div.innerHTML = `
                    <label for="${fieldId}">${skill} (1-5)</label>
                    <input type="number" id="${fieldId}" name="${fieldId}" min="1" max="5" value="3">
                `;
                skillRatings.appendChild(div);
            });
        } else {
            ratingFields.style.display = 'none';
        }
    });

    document.getElementById('intakeForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const formData = new FormData(e.target);
        const data = Object.fromEntries(formData);

        showLoading(true);

        try {
            const response = await fetch('/phase0', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(data)
            });

            const result = await response.json();

            if (result.success) {
                showSuccess('Intake complete! Redirecting to interview...');
                setTimeout(() => {
                    window.location.href = result.redirect;
                }, 1500);
            } else {
                showError(result.error || 'Failed to complete intake');
                showLoading(false);
            }
        } catch (error) {
            showError('Network error: ' + error.message);
            showLoading(false);
        }
    });
</script>
{% endblock %}
